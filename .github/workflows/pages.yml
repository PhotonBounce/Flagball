# ============================================================
# OnlyFlags — GitHub Pages Deployment
# Deploys the pitch deck as an unlisted staging preview
# Design/Development by Photon-Bounce
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [pitch-deck.html, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: read
    steps:
      - name: Enable GitHub Pages (if not already enabled)
        run: |
          # Try to enable Pages with GitHub Actions as the build source.
          # This call is idempotent — it succeeds silently if already enabled.
          HTTP_CODE=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/pages_response.json
          # 201 = created, 409 = already exists — both are fine
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "409" ]; then
            echo "✅ Pages is enabled"
          elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "::warning::Permissions error ($HTTP_CODE). If Pages is not yet enabled, do it manually once: Settings → Pages → Source → GitHub Actions"
          else
            echo "::warning::Unexpected status $HTTP_CODE — continuing anyway"
          fi

  deploy:
    needs: enable-pages
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp pitch-deck.html _site/index.html
          # robots.txt — block all crawlers to keep it unlisted
          printf "User-agent: *\nDisallow: /\n" > _site/robots.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
