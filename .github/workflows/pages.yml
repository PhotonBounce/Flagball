# ============================================================
# OnlyFlags — GitHub Pages Deployment
# Deploys the pitch deck as an unlisted staging preview
# Design/Development by Photon-Bounce
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, copilot/quick-update-for-client, copilot/check-app-staging-status]
    paths: [pitch-deck.html, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare site
        run: |
          mkdir -p _site
          cp pitch-deck.html _site/index.html
          # robots.txt — block all crawlers to keep it unlisted
          printf "User-agent: *\nDisallow: /\n" > _site/robots.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
