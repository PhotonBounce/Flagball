# Design/Development by Photon-Bounce
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: onlyflags-db
    environment:
      POSTGRES_DB: onlyflags_dev
      POSTGRES_USER: onlyflags
      POSTGRES_PASSWORD: onlyflags_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyflags -d onlyflags_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: onlyflags-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
